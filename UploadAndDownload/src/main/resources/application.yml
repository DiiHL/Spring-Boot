cors:
  originPatterns: https://localhost:8080,https://localhost:3000,https://erudio.com.br
file:
  upload-dir: ${USERPROFILE}\Documents\Java\SpringBoot\Spring-Boot\UploadAndDownload\uploads
spring:
  application:
    name: first-application-spring-boot
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/first_spring_boot_diih?useTimezone=true&serverTimezone=UTC
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
    show-sql: false
  open-in-view: false
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215MB
  flyway:
    baseline-on-migrate: true
logging:
  level:
    br.com.diih: DEBUG
spring-doc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    use-root-path: TRUE
